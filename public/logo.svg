<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="sc-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="sc-soft-glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Orbital ring -->
  <circle cx="24" cy="24" r="20" stroke="url(#sc-grad)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Flowing pulse line -->
  <path d="M8 24c0 0 4-10 8-4s4 14 8 8 8-10 8-4" stroke="url(#sc-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Core orb -->
  <circle cx="24" cy="24" r="4" fill="url(#sc-glow)" filter="url(#sc-soft-glow)"/>
</svg>
